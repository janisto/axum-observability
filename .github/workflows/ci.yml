name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  format-lint:
    name: Format, manifest, Clippy, and rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-lint
      - run: cargo fmt --all -- --check
      - run: cargo install --locked cargo-sort --version 2.1.3
      - run: cargo sort --check --grouped
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo doc --locked --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D rustdoc::all

  tests:
    name: Tests and doctests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.97.0 --profile minimal
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-tests
      - run: cargo test --locked --all-targets --all-features
      - run: cargo test --locked --doc

  dependency-policy:
    name: Dependency policy and audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.97.0 --profile minimal
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-policy
      - run: cargo install --locked cargo-deny --version 0.20.2
      - run: cargo install --locked cargo-audit --version 0.22.2
      - run: cargo install --locked cargo-machete --version 0.9.2
      - run: cargo machete
      - run: cargo deny check
      - run: cargo audit

  direct-minimum-dependencies:
    name: Direct minimum dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install nightly-2026-07-16 --profile minimal
      - run: rustup toolchain install 1.97.0 --profile minimal
      - run: cargo +nightly-2026-07-16 generate-lockfile -Z direct-minimal-versions
      - run: cargo +1.97.0 check --locked --all-features

  external-types:
    name: Public external types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install nightly-2026-03-20 --profile minimal
      - run: cargo install --locked cargo-check-external-types --version 0.5.0
      - name: Check reviewed public external types
        shell: bash
        run: |
          set -euo pipefail
          # The tool's pinned Rust 1.96 nightly predates this crate's MSRV.
          # Removing only Cargo's version gate leaves the documented API intact.
          cp Cargo.toml Cargo.toml.external-types
          trap 'mv Cargo.toml.external-types Cargo.toml' EXIT
          sed -i '/^rust-version = /d' Cargo.toml
          cargo +nightly-2026-03-20 check-external-types --all-features

  coverage:
    name: Source coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.97.0 --profile minimal --component llvm-tools-preview
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-coverage
      - run: cargo install --locked cargo-llvm-cov --version 0.8.7
      - run: cargo llvm-cov --locked --all-features --workspace --lcov --output-path coverage.lcov
      - run: cargo llvm-cov --locked --all-features --workspace --html
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: |
            coverage.lcov
            target/llvm-cov/html
          if-no-files-found: error
          retention-days: 7
