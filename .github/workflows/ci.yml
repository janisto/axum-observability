name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  format-lint:
    name: Format, manifest, Clippy, and rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-lint
      - run: cargo fmt --all -- --check
      - run: cargo install --locked cargo-sort
      - run: cargo sort --check --grouped
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo doc --locked --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D rustdoc::all

  tests:
    name: Tests and doctests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.97.0 --profile minimal
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-tests
      - run: cargo test --locked --all-targets --all-features
      - run: cargo test --locked --doc

  dependency-policy:
    name: Dependency policy and audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.97.0 --profile minimal
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-policy
      - run: cargo install --locked cargo-deny
      - run: cargo install --locked cargo-audit
      - run: cargo install --locked cargo-machete
      - run: cargo machete
      - run: cargo deny check
      - run: cargo audit

  direct-minimum-dependencies:
    name: Direct minimum dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install nightly-2026-07-16 --profile minimal
      - run: rustup toolchain install 1.97.0 --profile minimal
      - run: cargo +nightly-2026-07-16 generate-lockfile -Z direct-minimal-versions
      - run: cargo +1.97.0 check --locked --all-features

  external-types:
    name: Public external types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install nightly-2026-03-20 --profile minimal
      - run: cargo install --locked cargo-check-external-types
      - name: Check reviewed public external types
        shell: bash
        run: |
          set -euo pipefail
          # The tool's pinned Rust 1.96 nightly predates this crate's MSRV.
          # Removing only Cargo's version gate leaves the documented API intact.
          cp Cargo.toml Cargo.toml.external-types
          trap 'mv Cargo.toml.external-types Cargo.toml' EXIT
          sed -i '/^rust-version = /d' Cargo.toml
          cargo +nightly-2026-03-20 check-external-types --all-features

  coverage:
    name: Source coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.97.0 --profile minimal --component llvm-tools-preview
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-coverage
      - run: cargo install --locked cargo-llvm-cov
      - run: cargo llvm-cov --locked --all-features --workspace --lcov --output-path coverage.lcov
      - run: cargo llvm-cov --locked --all-features --workspace --html
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: |
            coverage.lcov
            target/llvm-cov/html
          if-no-files-found: error
          retention-days: 7

  e2e-image:
    name: E2E consumer image
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'release/prepare-v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Install just
        uses: extractions/setup-just@v4.0.0
      - name: Build E2E consumer image
        run: just e2e-image observability-e2e-local:ci

  release-e2e-gate:
    name: Release E2E gate
    needs: [e2e-image]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Enforce release E2E image result
        env:
          BASE_REF: ${{ github.base_ref }}
          E2E_RESULT: ${{ needs.e2e-image.result }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name || '' }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "Release E2E gate is not applicable to $EVENT_NAME."
            exit 0
          fi

          if [[ "$HEAD_REF" != release/* ]]; then
            echo "Release E2E image is not required for $HEAD_REF."
            exit 0
          fi

          if [[ "$HEAD_REPOSITORY" != "$REPOSITORY" ]]; then
            echo "::error::The release/ namespace is reserved for branches in $REPOSITORY."
            exit 1
          fi

          if [[ "$BASE_REF" != "main" ]]; then
            echo "::error::Release preparation pull requests must target main."
            exit 1
          fi

          if [[ ! "$HEAD_REF" =~ ^release/prepare-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)([A-Za-z][A-Za-z0-9.]*|-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "::error::Release branches must match release/prepare-vMAJOR.MINOR.PATCH with an optional supported prerelease suffix."
            exit 1
          fi

          VERSION="${HEAD_REF#release/prepare-v}"
          if [[ "$PR_TITLE" != "chore: prepare v$VERSION" ]]; then
            echo "::error::Release pull request title must be: chore: prepare v$VERSION"
            exit 1
          fi

          if [[ "$E2E_RESULT" != "success" ]]; then
            echo "::error::E2E consumer image result was $E2E_RESULT; expected success."
            exit 1
          fi

          echo "Release E2E consumer image passed for v$VERSION."
