name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  format-lint:
    name: Format and Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.96.1 --profile minimal --component clippy,rustfmt
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-lint
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  tests:
    name: Tests and doctests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.96.1 --profile minimal
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-tests
      - run: cargo test --locked --all-targets
      - run: cargo test --locked --doc

  dependency-policy:
    name: Dependency policy and audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.96.1 --profile minimal
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-policy
      - run: cargo install --locked cargo-deny --version 0.20.2
      - run: cargo install --locked cargo-audit --version 0.22.2
      - run: cargo deny check
      - run: cargo audit

  coverage:
    name: Branch coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.96.1 --profile minimal --component llvm-tools-preview
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-coverage
      - run: cargo install --locked cargo-llvm-cov --version 0.8.7
      - run: cargo llvm-cov --locked --all-features --workspace --branch --lcov --output-path coverage.lcov
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-lcov
          path: coverage.lcov
          if-no-files-found: error
          retention-days: 7

  package:
    name: Package and isolated consumer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.96.1 --profile minimal
      - uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-package
      - run: bash scripts/package-check.sh
