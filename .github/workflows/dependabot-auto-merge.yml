# Classify all Dependabot updates and auto-merge minor and patch updates.
name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dependabot:
    name: Classify and auto-merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'janisto/axum-observability'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add semantic update label
        run: gh pr edit "$PR_URL" --add-label "$UPDATE_LABEL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          UPDATE_LABEL: ${{ fromJSON('{"version-update:semver-major":"major","version-update:semver-minor":"minor","version-update:semver-patch":"patch"}')[steps.metadata.outputs.update-type] }}

      - name: Approve and auto-merge minor and patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr edit "$PR_URL" --add-label "automerge"
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
